apiVersion: v1
kind: ServiceAccount
metadata:
  name: csm-visualizer-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: csm-visualizer-role
rules:
- apiGroups: ["networking.istio.io"]
  resources: ["virtualservices", "destinationrules"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csm-visualizer-rb
subjects:
- kind: ServiceAccount
  name: csm-visualizer-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: csm-visualizer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csm-visualizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csm-visualizer
  template:
    metadata:
      labels:
        app: csm-visualizer
    spec:
      serviceAccountName: csm-visualizer-sa
      containers:
      - name: backend
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install fastapi uvicorn kubernetes pydantic
            python app.py
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-code
          mountPath: /app
        workingDir: /app
      volumes:
      - name: app-code
        configMap:
          name: csm-visualizer-code
---
apiVersion: v1
kind: Service
metadata:
  name: csm-visualizer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: csm-visualizer